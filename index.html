<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deployed ✓</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --green: #00ff87;
      --green-dim: #00ff8733;
      --white: #f0f0f0;
      --gray: #555570;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--green-dim) 1px, transparent 1px),
        linear-gradient(90deg, var(--green-dim) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      border: 1px solid var(--green);
      color: var(--green);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 0.35em 1em;
      margin-bottom: 2rem;
      animation: fadeIn 0.5s ease both;
    }

    .checkmark {
      font-size: clamp(5rem, 15vw, 9rem);
      line-height: 1;
      color: var(--green);
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
      text-shadow: 0 0 60px #00ff8766;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: -0.02em;
      margin: 0.5rem 0 1rem;
      animation: slideUp 0.5s ease 0.4s both;
    }

    h1 span { color: var(--green); }

    .meta {
      color: var(--gray);
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      animation: slideUp 0.5s ease 0.55s both;
      margin-bottom: 2.5rem;
    }

    #timestamp { color: var(--green); }

    .divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--green), transparent);
      margin: 0 auto 2rem;
      animation: grow 0.5s ease 0.7s both;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--green-dim);
      border: 1px solid var(--green-dim);
      max-width: 420px;
      margin: 0 auto;
      animation: fadeIn 0.5s ease 0.8s both;
    }

    .info-cell {
      background: var(--bg);
      padding: 1rem 1.25rem;
      text-align: left;
    }

    .info-label {
      font-size: 0.6rem;
      color: var(--gray);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .info-value { font-size: 0.8rem; color: var(--white); }
    .info-value.ok { color: var(--green); }

    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 2s ease infinite;
    }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(14px) } to { opacity: 1; transform: none } }
    @keyframes pop { from { opacity: 0; transform: scale(0.5) } to { opacity: 1; transform: scale(1) } }
    @keyframes grow { from { transform: scaleY(0) } to { transform: scaleY(1) } }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 #00ff8766 }
      50% { box-shadow: 0 0 0 6px transparent }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">GitHub Pages</div>
    <div class="checkmark">✓</div>
    <h1>It <span>works.</span></h1>
    <p class="meta">Deployed at <span id="timestamp"></span></p>
    <div class="divider"></div>
    <div class="info-grid">
      <div class="info-cell">
        <div class="info-label">Status</div>
        <div class="info-value ok"><span class="dot"></span>Live</div>
      </div>
      <div class="info-cell">
        <div class="info-label">Workflow</div>
        <div class="info-value ok">Passed</div>
      </div>
      <div class="info-cell">
        <div class="info-label">Branch</div>
        <div class="info-value">main</div>
      </div>
      <div class="info-cell">
        <div class="info-label">Trigger</div>
        <div class="info-value">push</div>
      </div>
    </div>
  </div>

  <script>
    const ts = new Date().toLocaleString('pl-PL', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    document.getElementById('timestamp').textContent = ts;
  </script>
</body>
</html>
