<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Close the ticket, Rajesh.</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f4ef;
      --ink: #111111;
      --green: #2d6a4f;
      --green-light: #d8f3dc;
      --muted: #999990;
      --ticket: #fff;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      padding: 2rem;
    }

    .ticket {
      background: var(--ticket);
      max-width: 500px;
      width: 100%;
      border-radius: 3px;
      box-shadow:
        0 1px 2px rgba(0,0,0,0.06),
        0 4px 24px rgba(0,0,0,0.08);
      overflow: hidden;
      animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .ticket-header {
      background: var(--green);
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ticket-id {
      color: #a8d5b5;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
    }

    .badge-closed {
      background: var(--green-light);
      color: var(--green);
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.25em 0.75em;
      border-radius: 2px;
    }

    .perforation {
      height: 14px;
      background:
        radial-gradient(circle at 50% 150%, var(--bg) 60%, transparent 61%) -14px 0 / 28px 14px,
        var(--green);
      background-repeat: repeat-x;
    }

    .ticket-body {
      padding: 2.5rem 2rem 2rem;
      text-align: center;
    }

    .status-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
      display: block;
    }

    .main-line {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 8vw, 3rem);
      line-height: 1.1;
      color: var(--ink);
      margin-bottom: 0.5rem;
      animation: slideUp 0.4s ease 0.4s both;
    }

    .main-line em {
      font-style: italic;
      color: var(--green);
    }

    .sub-line {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
      animation: slideUp 0.4s ease 0.5s both;
    }

    .divider {
      border: none;
      border-top: 1px dashed #ddd;
      margin: 0 0 1.5rem;
    }

    .rajesh-line {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--ink);
      margin-bottom: 0.4rem;
      animation: slideUp 0.4s ease 0.6s both;
    }

    .rajesh-line strong { color: var(--green); }

    .close-line {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      animation: slideUp 0.4s ease 0.7s both;
      margin-bottom: 2rem;
    }

    .stamp {
      display: inline-block;
      border: 3px solid var(--green);
      color: var(--green);
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      padding: 0.3em 1.2em;
      border-radius: 4px;
      transform: rotate(-4deg);
      opacity: 0;
      animation: stamp 0.4s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
      margin-bottom: 2rem;
    }

    .ticket-footer {
      border-top: 1px solid #eee;
      padding: 0.8rem 1.5rem;
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px) scale(0.97) }
      to   { opacity: 1; transform: none }
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.4) }
      to   { opacity: 1; transform: scale(1) }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px) }
      to   { opacity: 1; transform: none }
    }
    @keyframes stamp {
      0%   { opacity: 0; transform: rotate(-4deg) scale(1.4) }
      60%  { opacity: 1; transform: rotate(-4deg) scale(0.95) }
      100% { opacity: 1; transform: rotate(-4deg) scale(1) }
    }
  </style>
</head>
<body>
  <div class="ticket">
    <div class="ticket-header">
      <span class="ticket-id">TICKET #GH-4092</span>
      <span class="badge-closed">● Resolved</span>
    </div>
    <div class="perforation"></div>

    <div class="ticket-body">
      <span class="status-icon">✓</span>

      <h1 class="main-line">It <em>works.</em></h1>
      <p class="sub-line">GitHub Pages · Deployment confirmed · <span id="ts"></span></p>

      <hr class="divider"/>

      <p class="rajesh-line">Thank you, <strong>Rajesh.</strong></p>
      <p class="close-line">You can close the ticket now.</p>

      <div class="stamp">CLOSED</div>
    </div>

    <div class="ticket-footer">
      <span>github-pages / main</span>
      <span>workflow: passed</span>
    </div>
  </div>

  <script>
    document.getElementById('ts').textContent = new Date().toLocaleString('en-GB', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  </script>
</body>
</html>
